    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Consolas', 'Lucida Console', Monaco, monospace;
        }

        #putty-window {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            border: 1px solid #777;
            box-sizing: border-box;
        }

        #title-bar {
            background: linear-gradient(to bottom, #f0f0f0, #ccc);
            height: 30px;
            display: flex;
            align-items: center;
            padding: 0 5px;
            justify-content: space-between;
            color: #000;
            user-select: none;
            cursor: default;
        }

        .title-text {
            display: flex;
            align-items: center;
            font-size: 14px;
        }

        .title-icon {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            background: #000;
            /* Placeholder for Putty icon */

        .window-controls {
            display: flex;
        }

        .control-btn {
            width: 45px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
        }

            background-color: #ddd;
        }

        #terminal-container {
            flex-grow: 1;
            padding: 2px;
            background-color: #000;
        }

        /* Overlay Styles */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 1000;
            color: #fff;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            font-family: 'Consolas', 'Lucida Console', Monaco, monospace;
        }

        #overlay.active {
            display: block;
        }

        /* Stealth Mode Overlay */
        #stealth-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10000;
            cursor: none;
        }

        #stealth-overlay.active {
            display: block;
        }

        .cheat-content {
            white-space: pre-wrap;
            line-height: 1.4;
            user-select: text;
        }

        .cheat-header {
            color: #afafaf;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .section-title {
            color: #00ff00;
            margin-top: 20px;
            margin-bottom: 10px;
            text-decoration: underline;
        }

            background-color: #111;

            display: none;

            left: 0;

            color: #ccc;
            z-index: 200;
            flex-direction: column;
            font-size: 16px;

        #nano-header {
            display: flex;
            justify-content: space-between;
            background-color: #aaa;
            color: #000;
            padding: 1px 10px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        #nano-textarea {
            flex: 1;
            background-color: #000;
            color: #d4d4d4;
            border: none;
            outline: none;
            resize: none;
            font-family: 'Consolas', 'Lucida Console', Monaco, monospace;
            font-size: 16px;
            padding: 4px 8px;
            white-space: pre;
            overflow: auto;

        #nano-footer {
            padding: 4px 8px;

            margin-right: 4px;

        }

        #login-error {
            display: none;

    <script>
        const term = new Terminal({
            cursorBlink: true,
            fontFamily: "'Consolas', 'Lucida Console', Monaco, monospace",
            fontSize: 16,
            theme: {
                background: '#000000',
                foreground: '#ffffff'

        // ── Shell State ──────────────────────────────────────────────────────
        let regNo = '';

        let history = [];

        let fileSystem = [
            { name: 'snap', type: 'dir' }
        ];

        const fitAddon = new FitAddon.FitAddon();

        function initTerminal() {
            term.loadAddon(fitAddon);
            term.open(document.getElementById('terminal-container'));

            term.write('Login: ');

            window.addEventListener('resize', () => { fitAddon.fit(); });
        }

        const cheatSheets = {
            "1": {
                title: "Basic Commands (rm, cp, cat, mv, cmp, wc, split, diff)",
                aim: "To understand and practice the basic Linux commands (rm, cp, cat, mv, cmp, wc, split, diff) for managing files and directories, comparing files, and analyzing file content.",
                algorithm: "Step 1: Create sample files for testing commands.\nStep 2: Use cat to display content of files.\nStep 3: Use cp to copy files to new locations or names.\nStep 4: Use mv to move or rename files.\nStep 5: Use rm to delete unnecessary files.\nStep 6: Use cmp to compare files byte by byte.\nStep 7: Use diff to find line-by-line differences between files.\nStep 8: Use wc to count lines, words, and characters.\nStep 9: Use split to divide large files into smaller files.\nStep 10: Repeat and observe results to understand command behavior.",
                code: "# Create\necho \"Hello\" > f1.txt\n# Cat\ncat f1.txt\n# Copy\ncp f1.txt f2.txt\n# Word Count\nwc f1.txt\n# Diff\ndiff f1.txt f2.txt",
                output: "stud50@192.168.5.250:~$ echo \"Hello World\" > file1.txt\nstud50@192.168.5.250:~$ cat file1.txt\nHello World\nstud50@192.168.5.250:~$ wc file1.txt\n 1  2 12 file1.txt\nstud50@192.168.5.250:~$ cp file1.txt file2.txt\nstud50@192.168.5.250:~$ diff file1.txt file2.txt\nstud50@192.168.5.250:~$ "
            },
            "2": {
                title: "File Commands (mkdir, rmdir, touch, sort)",
                aim: "To write a shell script that demonstrates basic Linux file-handling and directory-handling commands such as creating directories, creating files, adding content, sorting file data, removing empty directories, and displaying the final contents.",
                algorithm: "Step 1: Create directories (mkdir myfolder, mkdir myfolder/subfolder).\nStep 2: Create empty files (touch myfolder/file1.txt).\nStep 3: Sort the files (sort myfolder/file1.txt -o myfolder/file1_sorted.txt).\nStep 4: Remove an empty directory (rmdir myfolder/subfolder).\nStep 5: Display final results (ls myfolder).",
                code: "mkdir myfolder\ntouch myfolder/file1.txt\nsort myfolder/file1.txt -o sorted.txt\nls myfolder",
                output: "stud50@192.168.5.250:~$ mkdir myfolder\nstud50@192.168.5.250:~$ mkdir myfolder/subfolder\nstud50@192.168.5.250:~$ touch myfolder/file1.txt\nstud50@192.168.5.250:~$ ls myfolder\nfile1.txt  subfolder\nstud50@192.168.5.250:~$ rmdir myfolder/subfolder\nstud50@192.168.5.250:~$ ls myfolder\nfile1.txt\nstud50@192.168.5.250:~$ "
            },
            "3": {
                title: "Thread Creation using Pthread",
                aim: "To write a C program that creates a new thread using the pthread library, makes the thread print a message and perform some work, and then waits for the thread to finish before the main program exits.",
                algorithm: "Step 1: Start the program and include the required header files.\nStep 2: Write a thread function that receives a message, prints it, waits for 2 seconds, and prints that it has finished.\nStep 3: In the main function, declare a variable for thread ID and store a message.\nStep 4: Create a new thread using pthread_create().\nStep 5: Check if creation was successful.\nStep 6: Print the ID of the new thread.\nStep 7: Wait for the thread to finish using pthread_join().\nStep 8: Print that the main thread is exiting.",
                code: "#include <pthread.h>\n#include <stdio.h>\n\nvoid* func(void* arg) {\n    printf(\"Thread says: %s\\n\", (char*)arg);\n    return NULL;\n}\n\nint main() {\n    pthread_t t;\n    pthread_create(&t, NULL, func, \"Hello World\");\n    pthread_join(t, NULL);\n    return 0;\n}",
                output: "stud50@192.168.5.250:~$ nano thread.c\nstud50@192.168.5.250:~$ gcc thread.c -lpthread -o thread\nstud50@192.168.5.250:~$ ./thread\nMain thread: Creating a new thread...\nMain thread: New thread created with ID 140224536733440.\nThread says: Hello, world! I am a new thread.\nThread finishes execution.\nMain thread: The new thread has finished. Main thread is exiting.\nstud50@192.168.5.250:~$ "
            },
            "4": {
                title: "Deadlock Detection",
                aim: "To write and execute a C program to detect deadlocked processes in a system using available resources, allocation matrix, request matrix and to display the processes that are in a deadlock state.",
                algorithm: "Step 1: Start the program.\nStep 2: Define the number of processes P and resources R.\nStep 3: Initialize available array, allocation matrix, request matrix, finish array, and work array.\nStep 4: Repeat the following steps until no changes occur.\nStep 5: For each process p not yet finished, check if all requested resources are less than or equal to available resources in work[].\nStep 6: If yes, simulate completion by adding allocated resources to work[] and mark the process as finished.\nStep 7: Print all process numbers whose finish value is still 0.\nStep 8: If no such process exists, print 'None' indicating no deadlock.",
                code: "#include <stdio.h>\n#define P 4\n#define R 3\nint available[R] = {1, 5, 2};\nint allocation[P][R] = {\n    {0, 1, 0},\n    {2, 0, 0},\n    {3, 0, 3},\n    {2, 1, 1}\n};\nint request[P][R] = {\n    {0, 0, 0},\n    {2, 0, 2},\n    {0, 0, 0},\n    {1, 0, 0}\n};\nint main() {\n    int finish[P] = {0};\n    int work[R];\n    for (int i = 0; i < R; i++)\n        work[i] = available[i];\n    int changed = 1;\n    while (changed) {\n        changed = 0;\n        for (int p = 0; p < P; p++) {\n            if (!finish[p]) {\n                int can_run = 1;\n                for (int r = 0; r < R; r++)\n                    if (request[p][r] > work[r])\n                        can_run = 0;\n                if (can_run) {\n                    for (int r = 0; r < R; r++)\n                        work[r] += allocation[p][r];\n                    finish[p] = 1;\n                    changed = 1;\n                }\n            }\n        }\n    }\n    printf(\"Deadlocked processes: \");\n    int none = 1;\n    for (int p = 0; p < P; p++) {\n        if (!finish[p]) {\n            printf(\"%d \", p);\n            none = 0;\n        }\n    }\n    if (none)\n        printf(\"None\");\n    printf(\"\\n\");\n    return 0;\n}",
                output: "stud50@192.168.5.250:~$ nano deadlock.c\nstud50@192.168.5.250:~$ gcc deadlock.c -o deadlock\nstud50@192.168.5.250:~$ ./deadlock\nCurrent System State:\nAvailable: 0 0 0\nAllocation:\nP0: 0 1 0\nP1: 2 0 0\nRequest:\nP0: 0 0 0\nP1: 2 0 2\n\nDeadlock detected: Process P1 is in deadlock.\nstud50@192.168.5.250:~$ "
            },
            "5": {
                title: "Memory Allocation Methods (malloc, free)",
                aim: "Write a C program demonstrates dynamic memory allocation using malloc() and subsequent deallocation using free().",
                algorithm: "Step 1: Start the program.\nStep 2: Declare integer variables n, i, and a pointer *ptr.\nStep 3: Prompt user for number of elements (n).\nStep 4: Allocate memory using malloc(n * sizeof(int)).\nStep 5: Check if memory allocation was successful (if ptr == NULL).\nStep 6: Prompt user to enter elements and store them using (ptr + i).\nStep 7: Display entered elements by printing *(ptr + i).\nStep 8: Deallocate memory block using free(ptr).\nStep 9: Exit program successfully.",
                code: "#include <stdio.h>\n#include <stdlib.h>\nint main() {\n    int n, i, *ptr;\n    printf(\"Enter number of elements: \");\n    scanf(\"%d\", &n);\n    // Allocate memory using malloc\n    ptr = (int*)malloc(n * sizeof(int));\n    if(ptr == NULL) {\n        printf(\"Error! memory not allocated.\");\n        return 1;\n    }\n    printf(\"Enter elements: \");\n    for(i = 0; i < n; ++i) {\n        scanf(\"%d\", ptr + i);\n    }\n    printf(\"Entered elements are: \");\n    for(i = 0; i < n; ++i) {\n        printf(\"%d \", *(ptr + i));\n    }\n    printf(\"\\n\");\n    // Deallocate the memory\n    free(ptr);\n    return 0;\n}",
                output: "stud50@192.168.5.250:~$ nano memory.c\nstud50@192.168.5.250:~$ gcc memory.c -o memory\nstud50@192.168.5.250:~$ ./memory\nEnter number of elements: 5\nEnter elements: 10 20 30 40 50\nEntered elements are: 10 20 30 40 50\nMemory successfully deallocated.\nstud50@192.168.5.250:~$ "
            },
            "6": {
                title: "Page Replacement (FIFO)",
                aim: "The aim is to simulate the First-In-First-Out (FIFO) page replacement algorithm used in operating systems memory management.",
                algorithm: "Step 1: Start the program.\nStep 2: Declare arrays pages and frames, and necessary integer variables.\nStep 3: Prompt user to enter no_of_frames, no_of_pages, and the reference string values.\nStep 4: Iterate through each page in the pages reference string.\nStep 5: For the current requested page, check if it's already in the frames array (hit).\nStep 6: If not found (fault), place the incoming page into the frame indicated by the next pointer.\nStep 7: Increment the faults counter and update the next pointer using next = (next + 1) % no_of_frames.\nStep 8: Print the current configuration of the frames array.\nStep 9: Exit the program.",
                code: "#include <stdio.h>\nint main() {\n    int pages[50], frames[10], no_of_pages, no_of_frames, i, j, k, flag, faults = 0, next = 0;\n    printf(\"Enter number of frames: \");\n    scanf(\"%d\", &no_of_frames);\n    printf(\"Enter number of pages in reference string: \");\n    scanf(\"%d\", &no_of_pages);\n    printf(\"Enter reference string (space separated): \");\n    for (i = 0; i < no_of_pages; ++i) {\n        scanf(\"%d\", &pages[i]);\n    }\n    // Initialize frames to -1 (empty)\n    for (i = 0; i < no_of_frames; ++i) {\n        frames[i] = -1;\n    }\n    printf(\"\\nPage Reference String | Frames (FIFO)\\n\");\n    printf(\"-----------------------------------\\n\");\n    for (i = 0; i < no_of_pages; ++i) {\n        printf(\"%d\\t\\t    | \", pages[i]);\n        flag = 0;\n        for (j = 0; j < no_of_frames; ++j) {\n            if (frames[j] == pages[i]) {\n                flag = 1; // Page hit\n                break;\n            }\n        }\n        if (flag == 0) {\n            // Page fault, replace the 'first-in' page\n            frames[next] = pages[i];\n            next = (next + 1) % no_of_frames; // Move to the next frame in circular manner\n            faults++;\n        }\n        // Display current frames\n        for (k = 0; k < no_of_frames; ++k) {\n            if (frames[k] != -1) {\n                printf(\"%d \", frames[k]);\n            } else {\n                printf(\"- \");\n            }\n        }\n        printf(\"\\n\");\n    }\n    printf(\"\\nTotal Page Faults: %d\\n\", faults);\n    return 0;\n}",
                output: "stud50@192.168.5.250:~$ nano fifo.c\nstud50@192.168.5.250:~$ gcc fifo.c -o fifo\nstud50@192.168.5.250:~$ ./fifo\nEnter number of frames: 3\nEnter reference string: 7 9 6 3\nPage Reference String | Frames (FIFO)\n-----------------------------------\n7\t\t    | 7 - -\n9\t\t    | 7 9 -\n6\t\t    | 7 9 6\n3\t\t    | 3 9 6\nTotal Page Faults: 4\nstud50@192.168.5.250:~$ "
            },
            "7": {
                title: "Palindrome or Not",
                aim: "Check the given string is palindrome or not",
                algorithm: "Step 1: Start the program.\nStep 2: Declare character array str and integers i, len, and flag.\nStep 3: Prompt user for a string and read it using gets().\nStep 4: Calculate the length of the string using strlen().\nStep 5: Initialize a loop from i = 0 up to len / 2.\nStep 6: Compare str[i] with str[len - i - 1].\nStep 7: If they don't match, set flag to 1 and break.\nStep 8: After the loop, check the flag. If 0, print it's a palindrome; if 1, print it's not.\nStep 9: Exit program.",
                code: "#include <stdio.h>\n#include <string.h>\nint main() {\n    char str[100];\n    int i, len, flag = 0;\n    printf(\"Enter a string: \");\n    // scanf(\"%s\", str); // Use scanf for single words\n    gets(str); // Use gets for strings with spaces (caution: potential buffer overflow)\n    len = strlen(str);\n    for(i = 0; i < len / 2; i++) {\n        if(str[i] != str[len - i - 1]) {\n            flag = 1;\n            break;\n        }\n    }\n    if (flag == 0) {\n        printf(\"%s is a palindrome.\\n\", str);\n    } else {\n        printf(\"%s is not a palindrome.\\n\", str);\n    }\n    return 0;\n}",
                output: "stud50@192.168.5.250:~$ nano pal.c\nstud50@192.168.5.250:~$ gcc pal.c -o pal\nstud50@192.168.5.250:~$ ./pal\nEnter a string: level\nlevel is a palindrome.\nstud50@192.168.5.250:~$ "
            },
            "8": {
                title: "Binary to Decimal Converter",
                aim: "The aim of this C program is to accept a binary number as a string input from the user and convert it to its equivalent decimal integer value.",
                algorithm: "Step 1: Start the program.\nStep 2: Declare a character array binaryString.\nStep 3: Prompt user to enter a binary number and read it.\nStep 4: Initialize decimalValue = 0 and power = 0.\nStep 5: Calculate length of binaryString.\nStep 6: Loop from the last character to the first character.\nStep 7: If the bit is '1', add 2^power to decimalValue.\nStep 8: Increment power at each step.\nStep 9: Print the final decimalValue and exit.",
                code: "#include <stdio.h>\n#include <string.h>\n#include <math.h>\nint binaryToDecimal(char binaryString[]) {\n    int decimalValue = 0;\n    int length = strlen(binaryString);\n    int power = 0;\n    // Iterate through the string from right to left (least significant bit to most significant bit)\n    for (int i = length - 1; i >= 0; i--) {\n        if (binaryString[i] == '1') {\n            // Add the corresponding power of 2 if the bit is 1\n            decimalValue += pow(2, power);\n        }\n        power++;\n    }\n    return decimalValue;\n}\nint main() {\n    char binaryString[100];\n    printf(\"Enter a binary number: \");\n    // Read the binary number as a string\n    scanf(\"%s\", binaryString);\n    // Convert and print the decimal value\n    int decimalValue = binaryToDecimal(binaryString);\n    printf(\"Decimal equivalent: %d\\n\", decimalValue);\n    return 0;\n}",
                output: "stud50@192.168.5.250:~$ nano bin.c\nstud50@192.168.5.250:~$ gcc bin.c -o bin -lm\nstud50@192.168.5.250:~$ ./bin\nEnter a binary number: 1010\nDecimal equivalent: 10\nstud50@192.168.5.250:~$ "
            },
            "9": {
                title: "Employee Details using Structure",
                aim: "The aim of this C program is to demonstrate the use of structures to manage employee data.",
                algorithm: "Step 1: Start the program.\nStep 2: Define a structure named employee with members code, name, and salary.\nStep 3: Declare a structure variable e1.\nStep 4: Prompt user for employee code, name, and salary and read them using scanf.\nStep 5: Display a header '--- Employee Details ---'.\nStep 6: Print the stored employee details (code, name, and salary).\nStep 7: End the program and return 0.",
                code: "#include <stdio.h>\n#include <string.h>\n// Define the structure for employee details\nstruct employee {\n    int code;\n    char name[20];\n    int salary;\n};\nint main() {\n    // Declare a variable of type struct employee\n    struct employee e1;\n    // Get input from the user\n    printf(\"Enter employee CODE: \");\n    scanf(\"%d\", &e1.code);\n    printf(\"Enter employee NAME: \");\n    // Use scanf for string input (be careful with spaces)\n    // For single-word names, this works fine.\n    scanf(\"%s\", e1.name);\n    printf(\"Enter employee SALARY: \");\n    scanf(\"%d\", &e1.salary);\n    // Display the employee details\n    printf(\"\\n--- Employee Details ---\\n\");\n    printf(\"Employee CODE is: %d\\n\", e1.code);\n    printf(\"Employee NAME is: %s\\n\", e1.name);\n    printf(\"Employee SALARY is: %d\\n\", e1.salary);\n    return 0;\n}",
                output: "stud50@192.168.5.250:~$ nano emp.c\nstud50@192.168.5.250:~$ gcc emp.c -o emp\nstud50@192.168.5.250:~$ ./emp\nEnter employee CODE: 101\nEnter employee NAME: John_Doe\nEnter employee SALARY: 50000\n\n--- Employee Details ---\nEmployee CODE is: 101\nEmployee NAME is: John_Doe\nEmployee SALARY is: 50000\nstud50@192.168.5.250:~$ "
            },
            "10": {
                title: "VMware/Linux Installation Study",
                aim: "To install any guest operating system (Linux) using VMware Workstation and study the virtual machine environment.",
                algorithm: "Step 1: Start VMware Workstation on the host system.\nStep 2: Download a Linux ISO file.\nStep 3: Click on Create a New Virtual Machine.\nStep 4: Select ISO and browse for the file.\nStep 5: Choose Linux and the appropriate version.\nStep 6: Enter VM name and storage location.\nStep 7: Allocate hard disk size (min 20 GB).\nStep 8: Customize hardware and click Finish.\nStep 9: Power on VM and select Install Linux.\nStep 10: Configure settings, create account, and wait for completion.\nStep 11: Restart and verify installation.",
                code: "# No code for study experiment.\n# Documentation experiment.",
                output: ""
            }
        };

        function showCheatSheet(num) {
            const sheet = cheatSheets[num];
            if (!sheet) return;

            currentViewingProgram = num;

            const header = document.querySelector('.cheat-header');
            const overlay = document.getElementById('overlay');

            header.style.display = 'block';
            header.innerHTML = `PuTTY Cheat Sheet - Program ${num}`;
            document.getElementById('cheat-body').innerHTML = `
                <div class="section-title">TITLE</div>
                <div>${sheet.title}</div>
                <div class="section-title">AIM</div>
                <div>${sheet.aim}</div>
                <div class="section-title">ALGORITHM</div>
                <div>${sheet.algorithm.replace(/\n/g, '<br/>')}</div>
                <div class="section-title">CODE</div>
                <div class="code-block">${sheet.code.replace(/\n/g, '<br/>')}</div>
            `;
            overlay.style.padding = '20px';
            overlay.classList.add('active');
        }

        function hideCheatSheet() {
            document.getElementById('overlay').classList.remove('active');
            currentViewingProgram = null;
        }

        function writeMockSession(num) {
            const sheet = cheatSheets[num];
            if (!sheet) return;

            // Close overlay if open
            hideCheatSheet();

            // Replace stud50 with current regNo in output
            const dynamicOutput = sheet.output.replace(/stud50/g, `stud${regNo}`);

            // Format output for xterm.js (use \r\n for new lines)
            const lines = dynamicOutput.split('\n');
            term.write('\r\n'); // Start on a new line
            lines.forEach(line => {
                const promptText = `stud${regNo}@192.168.5.250:~$ `;
                if (line.startsWith(promptText)) {
                    const cmd = line.substring(promptText.length);
                    // Parse mock command to update fileSystem
                    const parts = cmd.trim().split(/\s+/);
                    const action = parts[0] ? parts[0].toLowerCase() : "";
                    const args = parts.slice(1);

                    if (action === 'nano' || action === 'touch') {
                        if (args[0] && !fileSystem.find(f => f.name === args[0])) {
                            const cleanCode = (sheet.code || "").replace(/\\r/g, '').replace(/\\t/g, '    ');
                            fileSystem.push({ name: args[0], type: 'file', content: cleanCode });
                        }
                    } else if (action === 'gcc') {
                        const cleanCode = (sheet.code || "").replace(/\\r/g, '').replace(/\\t/g, '    ');
                        if (args[0] && !fileSystem.find(f => f.name === args[0])) fileSystem.push({ name: args[0], type: 'file', content: cleanCode });
                        const outIndex = args.indexOf('-o');
                        if (outIndex !== -1 && args[outIndex + 1]) {
                            const execName = args[outIndex + 1];
                            if (!fileSystem.find(f => f.name === execName)) fileSystem.push({ name: execName, type: 'exec' });
                        }
                    } else if (action === 'mkdir') {
                        if (args[0] && !fileSystem.find(f => f.name === args[0])) fileSystem.push({ name: args[0], type: 'dir' });
                    } else if (action === 'rm') {
                        if (args[0]) fileSystem = fileSystem.filter(f => f.name !== args[0]);
                    } else if (action === 'cp') {
                        if (args[0] && args[1]) {
                            const source = fileSystem.find(f => f.name === args[0]);
                            if (source && !fileSystem.find(f => f.name === args[1])) {
                                fileSystem.push({ name: args[1], type: source.type, content: source.content });
                            }
                        }
                    }

                    // Check for output redirection >
                    const redirectMatch = cmd.match(/>\s*([^\s]+)/);
                    if (redirectMatch && redirectMatch[1]) {
                        const newFile = redirectMatch[1];
                        const cleanCode = (sheet.code || "").replace(/\\r/g, '').replace(/\\t/g, '    ');
                        if (!fileSystem.find(f => f.name === newFile)) fileSystem.push({ name: newFile, type: 'file', content: cleanCode });
                    }


                    term.write(currentPrompt + cmd + '\r\n');
                } else {
                    term.write('\x1b[0;37m' + line + '\x1b[0m\r\n');
                }
            });
        }

        let inNano = false;
        let nanoFile = "";

        // ── Interactive Program Runner ──────────────────────────────────────
        let inProgram = false;
        let programState = 0;
        let programData = {};
        let programInputBuffer = "";

        // Programs registry — populated from the separate programs/*.js files loaded above
        const programs = {
            [programFIFO.name]: programFIFO,
            [programPAL.name]: programPAL,
            [programBIN.name]: programBIN,
            [programEMP.name]: programEMP,
            [programMEMORY.name]: programMEMORY,
            [programDEADLOCK.name]: programDEADLOCK,
            [programTHREAD.name]: programTHREAD,
        };


        function startProgram(name) {
            const prog = programs[name];
            if (!prog) return false;
            if (prog.prompts.length === 0) {
                // No input needed - run immediately and return prompt
                term.write(prog.run([]));
                term.write(currentPrompt);
                return true;
            }
            inProgram = true;
            programState = 0;
            programData = { _name: name };  // FIX: preserve name inside the reset object
            programInputBuffer = "";
            term.write(prog.prompts[0]);
            return true;
        }

        function handleProgramInput(line) {
            const prog = programs[Object.keys(programs).find(k => fileSystem.find(f => f.name === k && f.type === 'exec' && programs[k]))];
            // We store the current program name in programData._name
            const progName = programData._name;
            const p = programs[progName];
            programData[programState] = line;
            programState++;
            if (programState < p.prompts.length) {
                term.write(p.prompts[programState]);
            } else {
                const inputs = Array.from({ length: p.prompts.length }, (_, i) => programData[i]);
                term.write(p.run(inputs));
                inProgram = false;
                term.write(currentPrompt);
            }
        }

        document.getElementById('nano-textarea').addEventListener('keydown', function (domEvent) {
            if (domEvent.ctrlKey && domEvent.key.toLowerCase() === 'x') {
                domEvent.preventDefault();
                inNano = false;
                const finalContent = this.value;

                // Save to filesystem
                const existingFile = fileSystem.find(f => f.name === nanoFile);
                if (existingFile) {
                    existingFile.content = finalContent;
                } else {
                    fileSystem.push({ name: nanoFile, type: 'file', content: finalContent });
                }

                document.getElementById('nano-overlay').style.display = 'none';
                term.focus();
                term.write('\r\n' + currentPrompt);
            }
        });

        term.onKey(({ key, domEvent }) => {
            const char = domEvent.key;

            // ── Login Mode ──
            if (inLogin) {
                if (char === 'Enter') {
                    regNo = loginBuffer.trim() || '50';
                    inLogin = false;
                    currentPrompt = `\x1b[1;32mstud${regNo}@192.168.5.250\x1b[0m:\x1b[1;34m~\x1b[0m$ `;

                    // Auto enter fullscreen after user interaction (Enter key)
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(() => { });
                    }

                    term.write('\x1bc'); // Full terminal reset/clear
                    term.write(currentPrompt);
                    loginBuffer = '';
                } else if (char === 'Backspace') {
                    if (loginBuffer.length > 0) {
                        loginBuffer = loginBuffer.slice(0, -1);
                        term.write('\b \b');
                    }
                } else if (char.length === 1 && !domEvent.ctrlKey && !domEvent.altKey) {
                    loginBuffer += char;
                    term.write(char);
                }
                return;
            }

            // Handle interactive program input
            if (inProgram) {
                if (char === 'Enter') {
                    term.write('\r\n');
                    const line = programInputBuffer;
                    programInputBuffer = "";
                    handleProgramInput(line);
                } else if (char === 'Backspace') {
                    if (programInputBuffer.length > 0) {
                        programInputBuffer = programInputBuffer.slice(0, -1);
                        term.write('\b \b');
                    }
                } else if (char.length === 1 && !domEvent.ctrlKey && !domEvent.altKey) {
                    programInputBuffer += char;
                    term.write(char);
                }
                return;
            }

            // Handle Hidden Cheat Sheets (Alt+1...0)
            if (domEvent.altKey && char >= '0' && char <= '9') {
                domEvent.preventDefault();
                const num = char === '0' ? '10' : char;

                if (currentViewingProgram === num) {
                    // Trigger mock session in terminal if same program is pressed again
                    writeMockSession(num);
                    term.write(currentPrompt); // Re-write prompt after session output
                } else {
                    // Show cheat sheet for new program
                    showCheatSheet(num);
                }
                return;
            }

            // Handle Back to Shell (Backspace)
            if (char === 'Backspace' && document.getElementById('overlay').classList.contains('active')) {
                domEvent.preventDefault();
                hideCheatSheet();
                return;
            }

            if (document.getElementById('overlay').classList.contains('active')) return;

            // Handle Global Stealth Mode (Alt+Del)
            if (domEvent.altKey && char === 'Delete') {
                domEvent.preventDefault();
                document.getElementById('stealth-overlay').classList.toggle('active');
                return;
            }

            if (document.getElementById('overlay').classList.contains('active')) return;

            if (char === 'Enter') {
                term.write('\r\n');
                handleCommand(inputBuffer);
                inputBuffer = "";
                if (!inNano && !inProgram) {
                    term.write(currentPrompt);
                }
            } else if (char === 'Backspace') {
                if (inputBuffer.length > 0) {
                    inputBuffer = inputBuffer.slice(0, -1);
                    term.write('\b \b');
                }
            } else if (char.length === 1) {
                inputBuffer += char;
                term.write(char);
            }
        });

        function handleCommand(cmd) {
            const parts = cmd.trim().split(/\s+/);
            const action = parts[0].toLowerCase();
            const args = parts.slice(1);

            if (!action) return;

            switch (action) {
                case 'ls':
                    const output = fileSystem.map(item => {
                        if (item.type === 'dir') return `\x1b[1;34m${item.name}\x1b[0m`;
                        if (item.type === 'exec') return `\x1b[1;32m${item.name}\x1b[0m`;
                        return item.name;
                    }).join('  ');
                    term.write(output + (output ? '\r\n' : ''));
                    break;
                case 'mkdir':
                    if (args[0]) {
                        if (!fileSystem.find(f => f.name === args[0])) {
                            fileSystem.push({ name: args[0], type: 'dir' });
                        }
                    }
                    break;
                case 'rm':
                    if (args[0]) {
                        fileSystem = fileSystem.filter(f => f.name !== args[0]);
                    }
                    break;
                case 'gcc':
                    if (args[0]) {
                        const outIndex = args.indexOf('-o');
                        if (outIndex !== -1 && args[outIndex + 1]) {
                            const execName = args[outIndex + 1];
                            if (!fileSystem.find(f => f.name === execName)) {
                                fileSystem.push({ name: execName, type: 'exec' });
                            }
                        }
                    }
                    break;
                case 'nano':
                    if (args[0]) {
                        inNano = true;
                        nanoFile = args[0];
                        const existingFile = fileSystem.find(f => f.name === nanoFile);
                        const initialContent = existingFile && existingFile.content !== undefined ? existingFile.content : "";

                        // Add the file to the filesystem if it doesn't exist yet
                        if (!existingFile) {
                            fileSystem.push({ name: nanoFile, type: 'file', content: initialContent });
                        }

                        document.getElementById('nano-filename-display').innerText = nanoFile;
                        const nanoTextarea = document.getElementById('nano-textarea');
                        // Sanitize: remove stray carriage returns
                        nanoTextarea.value = initialContent.replace(/\r/g, '');

                        document.getElementById('nano-overlay').style.display = 'flex';
                        setTimeout(() => {
                            nanoTextarea.focus();
                            nanoTextarea.setSelectionRange(0, 0);
                        }, 10);

                    } else {
                        term.write('nano: missing filename\r\n');
                    }
                    break;
                case 'touch':
                    if (args[0]) {
                        if (!fileSystem.find(f => f.name === args[0])) {
                            fileSystem.push({ name: args[0], type: 'file', content: "" });
                        }
                    }
                    break;
                case 'cp':
                    if (args[0] && args[1]) {
                        const source = fileSystem.find(f => f.name === args[0]);
                        if (source) {
                            if (!fileSystem.find(f => f.name === args[1])) {
                                fileSystem.push({ name: args[1], type: source.type, content: source.content });
                            }
                        } else {
                            term.write(`cp: cannot stat '${args[0]}': No such file or directory\r\n`);
                        }
                    } else {
                        term.write('cp: missing file operand\r\n');
                    }
                    break;
                case 'cat':
                    if (args[0]) {
                        const file = fileSystem.find(f => f.name === args[0]);
                        if (file) {
                            if (file.type === 'dir') {
                                term.write(`cat: ${args[0]}: Is a directory\r\n`);
                            } else if (file.content !== undefined) {
                                const lines = file.content.split('\n');
                                lines.forEach((line, i) => {
                                    if (i === lines.length - 1 && line === '') return;
                                    term.write(line + '\r\n');
                                });
                            }
                        } else {
                            term.write(`cat: ${args[0]}: No such file or directory\r\n`);
                        }
                    } else {
                        term.write('cat: missing operand\r\n');
                    }
                    break;
                case 'help':
                    term.write('Available commands: ls, mkdir, rm, nano, touch, cat, gcc, clear, help\r\n');
                    term.write('Cheat sheets: Alt+1 to Alt+0 (Double-press for Shell Session). Close: Backspace.\r\n');
                    break;
                case 'clear':
                    term.clear();
                    break;
                default:
                    if (action.startsWith('./')) {
                        const execName = action.slice(2);
                        const execFile = fileSystem.find(f => f.name === execName && f.type === 'exec');
                        if (execFile) {
                            // Find which program corresponds to this executable
                            const progName = Object.keys(programs).find(k => k === execName ||
                                fileSystem.some(f => f.name === execName + '.c' || f.name === execName));
                            // Map executable name to known program keys
                            const progKey = ({
                                fifo: 'fifo', pal: 'pal', bin: 'bin', emp: 'emp',
                                memory: 'memory', deadlock: 'deadlock', thread: 'thread'
                            })[execName];
                            if (progKey && programs[progKey]) {
                                const started = startProgram(progKey);
                                if (!started) term.write(`${action}: exec error\r\n`);
                            } else {
                                term.write(`${action}: no simulation defined\r\n`);
                            }
                        } else {
                            term.write(`-bash: ${action}: No such file or directory\r\n`);
                        }
                    } else {
                        term.write(`-bash: ${action}: command not found\r\n`);
                    }
            }
        }

        window.addEventListener('resize', () => {
            fitAddon.fit();
        });

        // Browser close functionality
        document.getElementById('close-btn').addEventListener('click', () => {
            window.close();
            // Typical browsers block window.close() unless opened via script.
            // As a fallback for a simulation, we'll inform that it might be blocked.
            setTimeout(() => {
                alert("Closing the terminal simulation...");
                window.location.href = "about:blank";
            }, 100);
        });

        // Initialize terminal on start
        initTerminal();
    </script>
