<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Consolas', 'Lucida Console', Monaco, monospace;
        }

        #putty-window {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            border: 1px solid #777;
            box-sizing: border-box;
        }

        #title-bar {
            background: linear-gradient(to bottom, #f0f0f0, #ccc);
            height: 30px;
            display: flex;
            align-items: center;
            padding: 0 5px;
            justify-content: space-between;
            color: #000;
            user-select: none;
            cursor: default;
        }

        .title-text {
            display: flex;
            align-items: center;
            font-size: 14px;
        }

        .title-icon {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            background: #000;
            /* Placeholder for Putty icon */
        }

        .window-controls {
            display: flex;
        }

        .control-btn {
            width: 45px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
        }

        .control-btn:hover {
            background-color: #ddd;
        }

        #terminal-container {
            flex-grow: 1;
            padding: 2px;
            background-color: #000;
        }

        /* Overlay Styles */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 1000;
            color: #fff;

            box-sizing: border-box;
            overflow-y: auto;
            font-family: 'Consolas', 'Lucida Console', Monaco, monospace;
        }

        #overlay.active {
            display: block;
        }

        /* Stealth Mode Overlay */
        #stealth-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10000;
            cursor: none;
        }

        #stealth-overlay.active {
            display: block;
        }

        .cheat-content {
            white-space: pre-wrap;
            line-height: 1.4;
            user-select: text;
        }

        .cheat-header {
            color: #afafaf;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .section-title {
            color: #fff;
            margin-top: 20px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .code-block {
            padding: 10px 0;
            margin: 10px 0;
            color: #fff;
            font-family: 'Consolas', 'Lucida Console', Monaco, monospace;
        }

        .output-block {
            background-color: #111;
            padding: 15px;
            border: 1px solid #333;
            margin: 10px 0;
            color: #fff;
            font-family: 'Consolas', 'Lucida Console', Monaco, monospace;
            white-space: pre-wrap;
            border-radius: 4px;
        }

        #nano-overlay {
            display: none;
            position: absolute;
            top: 30px;
            /* height of title bar */
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #000;
            color: #ccc;
            z-index: 200;
            flex-direction: column;
            font-size: 16px;
        }

        #nano-header {
            display: flex;
            justify-content: space-between;
            background-color: #aaa;
            color: #000;
            padding: 1px 10px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        #nano-textarea {
            flex: 1;
            background-color: #000;
            color: #d4d4d4;
            border: none;
            outline: none;
            resize: none;
            font-family: 'Consolas', 'Lucida Console', Monaco, monospace;
            font-size: 16px;
            padding: 4px 8px;
            white-space: pre;
            overflow: auto;
            tab-size: 4;
            -moz-tab-size: 4;
            caret-color: #d4d4d4;
        }

        #nano-footer {
            padding: 4px 8px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1px 8px;
            background-color: #111;
            border-top: 1px solid #555;
            font-size: 13px;
            font-family: 'Consolas', 'Lucida Console', Monaco, monospace;
        }

        .nano-shortcut {
            display: flex;
            align-items: center;

        .nano-shortcut span {

            color: #000;

            margin-right: 4px;

        }

        #login-error {
            display: none;
        }

    <script>
        const term = new Terminal({
            cursorBlink: true,
            fontFamily: "'Consolas', 'Lucida Console', Monaco, monospace",
            fontSize: 16,
            theme: { background: '#000000', foreground: '#ffffff' }
        });

        // ── Shell State ──────────────────────────────────────────────────────
        let regNo = '';
        let inLogin = true;
        let loginBuffer = '';
        let currentPrompt = '';
        let inputBuffer = "";
        let history = [];
        let currentViewingProgram = null;
        let currentDir = ""; // Empty string means root (~)
        let fileSystem = [
            { name: 'snap', type: 'dir' },
            { name: 'file1.txt', type: 'file', content: "hello" },
            { name: 'file2.txt', type: 'file', content: "hello" }
        ];

        let inNano = false;
        let nanoFile = "";
        let inProgram = false;
        let programState = 0;
        let programData = {};
        let programInputBuffer = "";

        const fitAddon = new FitAddon.FitAddon();

        function initTerminal() {
            term.loadAddon(fitAddon);
            term.open(document.getElementById('terminal-container'));
            fitAddon.fit();
            term.write('Login: ');
            window.addEventListener('resize', () => { fitAddon.fit(); });
        }

        function updatePrompt() {
            const dirLabel = currentDir ? `~/${currentDir}` : "~";
            currentPrompt = `\x1b[1;32mstud${regNo}@192.168.5.250\x1b[0m:\x1b[1;34m${dirLabel}\x1b[0m$ `;
        }

        function resolvePath(p) {
            if (!p || p === ".") return currentDir;
            if (p === "~" || p === "/home/stud" + regNo) return "";
            if (p.startsWith("/home/stud" + regNo + "/")) return p.slice(("/home/stud" + regNo + "/").length);
            if (p.startsWith("/")) return p.slice(1);
            if (p === "..") {
                if (!currentDir) return "";
                const parts = currentDir.split('/');
                parts.pop();
                return parts.join('/');
            }
            if (p.startsWith("../")) {
                let d = currentDir, pts = p.split('/');
                while (pts[0] === "..") {
                    const pArr = d.split('/'); pArr.pop(); d = pArr.join('/');
                    pts.shift();
                }
                return d ? d + "/" + pts.join('/') : pts.join('/');
            }
            return currentDir ? currentDir + "/" + p : p;
        }

        const cheatSheets = {
            "1": {
                title: "Basic Commands (rm, cp, cat, mv, cmp, wc, split, diff)",
                aim: "To practice basic Linux commands for file management and analysis.",
                algorithm: "Step 1: Create files. Step 2: Use cat, cp, mv, rm, cmp, diff, wc, split.",
                code: "echo \"Hello\" > f1.txt\ncp f1.txt f2.txt\nwc f1.txt\ndiff f1.txt f2.txt",
                output: "stud50@192.168.5.250:~$ echo \"hello\" > file1.txt\nstud50@192.168.5.250:~$ cat file1.txt\nhello\nstud50@192.168.5.250:~$ cp file1.txt file2.txt\nstud50@192.168.5.250:~$ mv file2.txt file3.txt\nstud50@192.168.5.250:~$ wc file1.txt\n 1 1 6 file1.txt\nstud50@192.168.5.250:~$ cmp file1.txt file3.txt\nstud50@192.168.5.250:~$ echo \"world\" > file4.txt\nstud50@192.168.5.250:~$ diff file1.txt file4.txt\n< hello\n> world\nstud50@192.168.5.250:~$ split 5 file1.txt\nstud50@192.168.5.250:~$ ls\nsnap  file1.txt  file3.txt  file4.txt  xaa  xab  xac\nstud50@192.168.5.250:~$ rm file4.txt\nstud50@192.168.5.250:~$ ls\nsnap  file1.txt  file3.txt  xaa  xab  xac\nstud50@192.168.5.250:~$ "
            },
            "2": {
                title: "File Commands (mkdir, rmdir, touch, sort)",
                aim: "To demonstrate basic file and directory handling.",
                algorithm: "Step 1: mkdir. Step 2: touch. Step 3: rmdir. Step 4: ls.",
                code: "mkdir myfolder\ntouch myfolder/file1.txt\nrmdir myfolder/subfolder\nls myfolder",
                output: "stud50@192.168.5.250:~$ mkdir myfolder\nstud50@192.168.5.250:~$ mkdir myfolder/subfolder\nstud50@192.168.5.250:~$ touch myfolder/file1.txt\nstud50@192.168.5.250:~$ ls myfolder\nfile1.txt  subfolder\nstud50@192.168.5.250:~$ rmdir myfolder/subfolder\nstud50@192.168.5.250:~$ ls myfolder\nfile1.txt\nstud50@192.168.5.250:~$ "
            },
            "3": {
                title: "Thread Creation (Pthread)",
                aim: "Simulate pthread creation and join.",
                algorithm: "Step 1: Define thread function. Step 2: pthread_create. Step 3: pthread_join.",
                code: "#include <pthread.h>\n...",
                output: "stud50@192.168.5.250:~$ nano thread.c\nstud50@192.168.5.250:~$ gcc thread.c -lpthread -o thread\nstud50@192.168.5.250:~$ ./thread\nMain thread: New thread created.\nThread says: Hello, world!\nMain thread: Finished.\nstud50@192.168.5.250:~$ "
            },
            "4": {
                title: "Deadlock Detection",
                aim: "Detect deadlock states in a simulated system.",
                algorithm: "Step 1: Init matrices. Step 2: Check safety. Step 3: List deadlock.",
                code: "#include <stdio.h>\n...",
                output: "stud50@192.168.5.250:~$ nano deadlock.c\nstud50@192.168.5.250:~$ gcc deadlock.c -o deadlock\nstud50@192.168.5.250:~$ ./deadlock\nDeadlock detected: Process P1.\nstud50@192.168.5.250:~$ "
            },
            "5": {
                title: "Memory Allocation (malloc)",
                aim: "Demonstrate dynamic memory allocation.",
                algorithm: "Step 1: malloc. Step 2: free.",
                code: "#include <stdlib.h>\n...",
                output: "stud50@192.168.5.250:~$ nano memory.c\nstud50@192.168.5.250:~$ gcc memory.c -o memory\nstud50@192.168.5.250:~$ ./memory\nMemory successfully deallocated.\nstud50@192.168.5.250:~$ "
            },
            "6": {
                title: "FIFO Page Replacement",
                aim: "Simulate FIFO page replacement algorithm.",
                algorithm: "Step 1: frames. Step 2: faults.",
                code: "#include <stdio.h>\n...",
                output: "stud50@192.168.5.250:~$ nano fifo.c\nstud50@192.168.5.250:~$ gcc fifo.c -o fifo\nstud50@192.168.5.250:~$ ./fifo\nTotal Page Faults: 4\nstud50@192.168.5.250:~$ "
            },
            "7": {
                title: "Palindrome Check",
                aim: "Check if a string is a palindrome.",
                algorithm: "Step 1: gets. Step 2: Check.",
                code: "#include <string.h>\n...",
                output: "stud50@192.168.5.250:~$ nano pal.c\nstud50@192.168.5.250:~$ gcc pal.c -o pal\nstud50@192.168.5.250:~$ ./pal\nlevel is a palindrome.\nstud50@192.168.5.250:~$ "
            },
            "8": {
                title: "Binary to Decimal",
                aim: "Convert binary string to decimal.",
                algorithm: "Step 1: binary. Step 2: decimal.",
                code: "#include <math.h>\n...",
                output: "stud50@192.168.5.250:~$ nano bin.c\nstud50@192.168.5.250:~$ gcc bin.c -o bin -lm\nstud50@192.168.5.250:~$ ./bin\nDecimal equivalent: 10\nstud50@192.168.5.250:~$ "
            },
            "9": {
                title: "Employee Structure",
                aim: "Demonstrate structures.",
                algorithm: "Step 1: struct. Step 2: print.",
                code: "struct employee { ... };",
                output: "stud50@192.168.5.250:~$ nano emp.c\nstud50@192.168.5.250:~$ gcc emp.c -o emp\nstud50@192.168.5.250:~$ ./emp\nEmployee CODE is: 101\nstud50@192.168.5.250:~$ "
            },
            "10": {
                title: "VMware Study",
                aim: "Study Linux installation on VMware.",
                algorithm: "Step 1: VMware study.",
                code: "// Documentation",
                output: "Study complete."
            }
        };

        function showCheatSheet(num) {
            const sheet = cheatSheets[num];
            if (!sheet) return;
            currentViewingProgram = num;
            const header = document.querySelector('.cheat-header');
            if (header) header.style.display = 'none';
            document.getElementById('cheat-body').innerHTML = `
                <div class="section-title">TITLE</div><div>${sheet.title}</div>
                <div class="section-title">AIM</div><div>${sheet.aim}</div>
                <div class="section-title">ALGORITHM</div><div>${sheet.algorithm.replace(/\n/g, '<br/>')}</div>
                <div class="section-title">CODE</div><div class="code-block">${sheet.code.replace(/\n/g, '<br/>')}</div>
                <div class="section-title">OUTPUT</div><div class="output-block">${sheet.output.replace(/\n/g, '<br/>')}</div>
            `;
            document.getElementById('overlay').classList.add('active');
        }

        function hideCheatSheet() {
            document.getElementById('overlay').classList.remove('active');
            currentViewingProgram = null;
        }

        function writeMockSession(num) {
            const sheet = cheatSheets[num];
            if (!sheet) return;
            hideCheatSheet();
            const lines = sheet.output.replace(/stud50/g, `stud${regNo}`).split('\n');
            term.write('\r\n');
            lines.forEach(line => {
                if (line.includes('@192.168.5.250:')) {
                    const parts = line.split('$ ');
                    const cmd = parts[1] || "";
                    handleCommand(cmd, true);
                    updatePrompt();
                    term.write('\x1b[1;32m' + currentPrompt.split('$ ')[0] + '\x1b[0m$ ' + cmd + '\r\n');
                } else {
                    term.write('\x1b[0;37m' + line + '\x1b[0m\r\n');
                }
            });
            term.write(currentPrompt);
        }

        function handleCommand(cmd, silent = false) {
            const parts = cmd.trim().split(/\s+/);
            const action = parts[0] ? parts[0].toLowerCase() : "";
            const args = parts.slice(1);
            if (!action) return;
            if (!silent) history.push(cmd);

            switch (action) {
                case 'ls':
                    let target = resolvePath(args[0] || ".");
                    const filtered = fileSystem.filter(item => {
                        if (target === "") return !item.name.includes('/');
                        return item.name.startsWith(target + '/') && !item.name.slice(target.length + 1).includes('/');
                    });
                    if (!silent) {
                        const output = filtered.map(item => {
                            const dName = item.name.split('/').pop();
                            return item.type === 'dir' ? `\x1b[1;34m${dName}\x1b[0m` : (item.type === 'exec' ? `\x1b[1;32m${dName}\x1b[0m` : dName);
                        }).join('  ');
                        term.write(output + (output ? '\r\n' : ''));
                    }
                    break;
                case 'cd':
                    if (!args[0] || args[0] === "~") currentDir = "";
                    else {
                        const newPath = resolvePath(args[0]);
                        if (newPath === "" || fileSystem.find(f => f.name === newPath && f.type === 'dir')) currentDir = newPath;
                        else if (!silent) term.write(`-bash: cd: ${args[0]}: No such directory\r\n`);
                    }
                    updatePrompt();
                    break;
                case 'pwd':
                    if (!silent) term.write('/home/stud' + regNo + (currentDir ? '/' + currentDir : '') + '\r\n');
                    break;
                case 'mkdir':
                    if (args[0]) {
                        const p = resolvePath(args[0]);
                        if (!fileSystem.find(f => f.name === p)) fileSystem.push({ name: p, type: 'dir' });
                    }
                    break;
                case 'touch':
                    if (args[0]) {
                        const p = resolvePath(args[0]);
                        if (!fileSystem.find(f => f.name === p)) fileSystem.push({ name: p, type: 'file', content: "" });
                    }
                    break;
                case 'rm':
                    if (args[0]) fileSystem = fileSystem.filter(f => f.name !== resolvePath(args[0]));
                    break;
                case 'rmdir':
                    if (args[0]) {
                        const p = resolvePath(args[0]);
                        if (fileSystem.find(f => f.name === p && f.type === 'dir')) fileSystem = fileSystem.filter(f => f.name !== p);
                    }
                    break;
                case 'cp':
                case 'mv':
                    if (args[0] && args[1]) {
                        const s = resolvePath(args[0]), d = resolvePath(args[1]);
                        const src = fileSystem.find(f => f.name === s);
                        if (src) {
                            fileSystem = fileSystem.filter(f => f.name !== d);
                            if (action === 'cp') fileSystem.push({ name: d, type: src.type, content: src.content });
                            else src.name = d;
                        }
                    }
                    break;
                case 'echo':
                    const redirIdx = args.indexOf('>');
                    if (redirIdx !== -1 && args[redirIdx + 1]) {
                        const fn = resolvePath(args[redirIdx + 1]);
                        const c = args.slice(0, redirIdx).join(' ').replace(/^["']/, '').replace(/["']$/, '');
                        fileSystem = fileSystem.filter(f => f.name !== fn);
                        fileSystem.push({ name: fn, type: 'file', content: c });
                    } else if (!silent) term.write(args.join(' ') + '\r\n');
                    break;
                case 'cat':
                    if (args[0]) {
                        const f = fileSystem.find(f => f.name === resolvePath(args[0]));
                        if (f && f.content !== undefined && !silent) {
                            f.content.split('\n').forEach((l, i, arr) => term.write(l + (i < arr.length - 1 ? '\r\n' : '')));
                            term.write('\r\n');
                        }
                    }
                    break;
                case 'whoami': if (!silent) term.write('stud' + regNo + '\r\n'); break;
                case 'history': if (!silent) history.forEach((l, i) => term.write(`  ${i + 1}  ${l}\r\n`)); break;
                case 'clear': if (!silent) term.clear(); break;
                case 'help': if (!silent) term.write('Implemented: ls, cd, pwd, mkdir, rmdir, touch, rm, cp, mv, cat, whoami, clear, history, help, gcc, nano, split, cmp, diff, grep\r\n'); break;
                case 'gcc':
                    if (args[0]) {
                        const s = resolvePath(args[0]);
                        const oIdx = args.indexOf('-o');
                        if (oIdx !== -1 && args[oIdx + 1]) {
                            const e = resolvePath(args[oIdx + 1]);
                            if (!fileSystem.find(f => f.name === e)) fileSystem.push({ name: e, type: 'exec' });
                        }
                    }
                    break;
                case 'nano':
                    if (args[0] && !silent) {
                        inNano = true; nanoFile = args[0];
                        const f = fileSystem.find(f => f.name === resolvePath(nanoFile));
                        const c = f ? f.content : "";
                        document.getElementById('nano-filename-display').innerText = nanoFile;
                        const ta = document.getElementById('nano-textarea');
                        ta.value = c;
                        document.getElementById('nano-overlay').style.display = 'flex';
                        setTimeout(() => ta.focus(), 10);
                    }
                    break;
                default: if (!silent) term.write(`-bash: ${action}: command not found\r\n`);
            }
        }

        const programs = {
            fifo: programFIFO, pal: programPAL, bin: programBIN,
            emp: programEMP, memory: programMEMORY, deadlock: programDEADLOCK,
            thread: programTHREAD
        };

        function startProgram(name) {
            const p = programs[name]; if (!p) return false;
            if (p.prompts.length === 0) { term.write(p.run([])); return true; }
            inProgram = true; programState = 0; programData = { _name: name }; programInputBuffer = "";
            term.write(p.prompts[0]); return true;
        }

        function handleProgramInput(line) {
            const p = programs[programData._name];
            programData[programState] = line; programState++;
            if (programState < p.prompts.length) term.write(p.prompts[programState]);
            else {
                term.write('\r\n' + p.run(Array.from({ length: p.prompts.length }, (_, i) => programData[i])));
                inProgram = false; term.write('\r\n' + currentPrompt);
            }
        }

        document.getElementById('nano-textarea').addEventListener('keydown', function (e) {
            if (e.ctrlKey && e.key.toLowerCase() === 'x') {
                e.preventDefault(); inNano = false;
                const path = resolvePath(nanoFile);
                const f = fileSystem.find(f => f.name === path);
                if (f) f.content = this.value;
                else fileSystem.push({ name: path, type: 'file', content: this.value });
                document.getElementById('nano-overlay').style.display = 'none';
                term.focus(); term.write('\r\n' + currentPrompt);
            }
        });

        term.onKey(({ key, domEvent }) => {
            const char = domEvent.key;
            if (inLogin) {
                if (char === 'Enter') {
                    regNo = loginBuffer.trim() || '50'; inLogin = false;
                    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => { });
                    term.write('\x1bc'); updatePrompt(); term.write(currentPrompt); loginBuffer = '';
                } else if (char === 'Backspace') {
                    if (loginBuffer.length > 0) { loginBuffer = loginBuffer.slice(0, -1); term.write('\b \b'); }
                } else if (char.length === 1 && !domEvent.ctrlKey && !domEvent.altKey) { loginBuffer += char; term.write(char); }
                return;
            }
            if (inProgram) {
                if (char === 'Enter') { term.write('\r\n'); const l = programInputBuffer; programInputBuffer = ""; handleProgramInput(l); }
                else if (char === 'Backspace') { if (programInputBuffer.length > 0) { programInputBuffer = programInputBuffer.slice(0, -1); term.write('\b \b'); } }
                else if (char.length === 1 && !domEvent.ctrlKey && !domEvent.altKey) { programInputBuffer += char; term.write(char); }
                return;
            }
            if (domEvent.altKey && char >= '0' && char <= '9') {
                domEvent.preventDefault(); const n = char === '0' ? '10' : char;
                if (currentViewingProgram === n) writeMockSession(n);
                else showCheatSheet(n);
                return;
            }
            if (char === 'Backspace' && document.getElementById('overlay').classList.contains('active')) { domEvent.preventDefault(); hideCheatSheet(); return; }
            if (document.getElementById('overlay').classList.contains('active')) return;

            if (char === 'Enter') {
                term.write('\r\n');
                const actionArr = inputBuffer.trim().split(/\s+/);
                const first = actionArr[0] ? actionArr[0].toLowerCase() : "";
                if (first.startsWith('./')) {
                    const name = first.slice(2);
                    const file = fileSystem.find(f => f.name === resolvePath(name) && f.type === 'exec');
                    if (file) startProgram(name);
                    else handleCommand(inputBuffer);
                } else {
                    handleCommand(inputBuffer);
                }
                inputBuffer = "";
                if (!inNano && !inProgram) term.write(currentPrompt);
            } else if (char === 'Backspace') {
                if (inputBuffer.length > 0) { inputBuffer = inputBuffer.slice(0, -1); term.write('\b \b'); }
            } else if (char.length === 1 && !domEvent.ctrlKey && !domEvent.altKey) { inputBuffer += char; term.write(char); }
        });

        document.getElementById('close-btn').addEventListener('click', () => {
            window.close();
            setTimeout(() => { alert("Closing simulation..."); window.location.href = "about:blank"; }, 100);
        });

        window.addEventListener('keydown', (e) => {
            if (e.altKey && e.key === 'Delete') {
                e.preventDefault();
                document.getElementById('stealth-overlay').classList.toggle('active');
            }
        }, true);

        initTerminal();
    </script>


</body>
