    <script>
        const term = new Terminal({
            cursorBlink: true,
            fontFamily: "'Consolas', 'Lucida Console', Monaco, monospace",
            fontSize: 16,
            theme: { background: '#000000', foreground: '#ffffff' }
        });

        // ── Shell State ──────────────────────────────────────────────────────
        let regNo = '';
        let inLogin = true;
        let loginBuffer = '';
        let currentPrompt = '';
        let inputBuffer = "";
        let history = [];
        let currentViewingProgram = null;
        let currentDir = ""; // Empty string means root (~)
        let fileSystem = [
            { name: 'snap', type: 'dir' }
        ];

        let inNano = false;
        let nanoFile = "";
        let inProgram = false;
        let programState = 0;
        let programData = {};
        let programInputBuffer = "";

        const fitAddon = new FitAddon.FitAddon();

        function initTerminal() {
            term.loadAddon(fitAddon);
            term.open(document.getElementById('terminal-container'));
            fitAddon.fit();
            term.write('Login: ');
            window.addEventListener('resize', () => { fitAddon.fit(); });
        }

        function updatePrompt() {
            const dirLabel = currentDir ? `~/${currentDir}` : "~";
            currentPrompt = `\x1b[1;32mstud${regNo}@192.168.5.250\x1b[0m:\x1b[1;34m${dirLabel}\x1b[0m$ `;
        }

        function resolvePath(p) {
            if (!p || p === ".") return currentDir;
            if (p === "~" || p === "/home/stud" + regNo) return "";
            if (p.startsWith("/home/stud" + regNo + "/")) return p.slice(("/home/stud" + regNo + "/").length);
            if (p.startsWith("/")) return p.slice(1);
            if (p === "..") {
                if (!currentDir) return "";
                const parts = currentDir.split('/');
                parts.pop();
                return parts.join('/');
            }
            if (p.startsWith("../")) {
                let d = currentDir, pts = p.split('/');
                while (pts[0] === "..") {
                    const pArr = d.split('/'); pArr.pop(); d = pArr.join('/');
                    pts.shift();
                }
                return d ? d + "/" + pts.join('/') : pts.join('/');
            }
            return currentDir ? currentDir + "/" + p : p;
        }

        const cheatSheets = {
            "1": {
                title: "Basic Commands (rm, cp, cat, mv, cmp, wc, split, diff)",
                aim: "To understand and practice the basic Linux commands (rm, cp, cat, mv, cmp, wc, split, diff) for managing files and directories, comparing files, and analyzing file content.",
                algorithm: "Step 1: Create sample files for testing commands.\nStep 2: Use cat to display content of files.\nStep 3: Use cp to copy files to new locations or names.\nStep 4: Use mv to move or rename files.\nStep 5: Use rm to delete unnecessary files.\nStep 6: Use cmp to compare files byte by byte.\nStep 7: Use diff to find line-by-line differences between files.\nStep 8: Use wc to count lines, words, and characters.\nStep 9: Use split to divide large files into smaller files.\nStep 10: Repeat and observe results to understand command behavior.",
                code: "echo \"Hello World\" > file1.txt\necho \"Hello Linux\" > file2.txt\ncat file1.txt\ncat file2.txt\ncp file1.txt file1_backup.txt\ncmp file1.txt file2.txt\nwc file1.txt\nmv file2.txt file2_renamed.txt\nsplit -l 1 file1.txt part_\ndiff file1.txt file1_backup.txt\nrm file1.txt\nrm -r folder1\ncp file1.txt file2.txt",
                output: "stud50@192.168.5.250:~$ echo \"Hello World\" > file1.txt\nstud50@192.168.5.250:~$ echo \"Hello Linux\" > file2.txt\nstud50@192.168.5.250:~$ cat file1.txt\nHello World\nstud50@192.168.5.250:~$ cp file1.txt file1_backup.txt\nstud50@192.168.5.250:~$ cmp file1.txt file2.txt\nfile1.txt file2.txt differ: byte 7, line 1\nstud50@192.168.5.250:~$ wc file1.txt\n 1 2 12 file1.txt\nstud50@192.168.5.250:~$ mv file2.txt file2_renamed.txt\nstud50@192.168.5.250:~$ split -l 1 file1.txt part_\nstud50@192.168.5.250:~$ ls\nsnap  file1.txt  file1_backup.txt  file2_renamed.txt  part_aa\nstud50@192.168.5.250:~$ diff file1.txt file1_backup.txt\nstud50@192.168.5.250:~$ rm file1.txt\nstud50@192.168.5.250:~$ "
            },
            "2": {
                title: "File Commands (mkdir, rmdir, touch, sort)",
                aim: "To write a shell script that demonstrates basic Linux file-handling and directory-handling commands such as creating directories, creating files, adding content, sorting file data, removing empty directories, and displaying the final contents.",
                algorithm: "Step 1: Create directories:\nStep 2: Display a message indicating directory creation.\nStep 3: Use mkdir to create a folder named myfolder.\nStep 4: Use mkdir again to create a subfolder myfolder/subfolder.\nStep 5: Create empty files:\nStep 6: Display a message about file creation.\nStep 7: Use touch to create two empty files: file1.txt and file2.txt inside myfolder.\nStep 8: Sort the files:\nStep 9: Display a message about sorting.\nStep 10: Use sort to sort the text in file1.txt alphabetically and save as file1_sorted.txt.\nStep 11: Use sort -n to sort the numbers in file2.txt numerically and save as file2_sorted.txt.\nStep 12: Remove an empty directory:\nStep 13: Display a message about removal..\nStep 14: Use rmdir to delete the empty directory myfolder/subfolder.\nStep 15: Display final results:\nStep 16: Print a message indicating the contents of the folder.\nStep 17: Use ls myfolder to list all files inside the directory.\nStep 18: End the script.",
                code: "echo \"Creating directories...\"\nmkdir myfolder\nmkdir myfolder/subfolder\necho \"Directories created: myfolder and myfolder/subfolder\"\necho \"Creating files...\"\ntouch myfolder/file1.txt\ntouch myfolder/file2.txt\necho \"Files created: file1.txt and file2.txt\"\necho \"Sorting files...\"\nsort myfolder/file1.txt -o myfolder/file1_sorted.txt\nsort -n myfolder/file2.txt -o myfolder/file2_sorted.txt\necho \"Sorted files saved as file1_sorted.txt and file2_sorted.txt\"\necho \"Removing empty subfolder...\"\nrmdir myfolder/subfolder\necho \"subfolder removed\"\necho \"Contents of myfolder:\"\nls myfolder\nls -l",
                output: "stud50@192.168.5.250:~$ mkdir myfolder\nstud50@192.168.5.250:~$ mkdir myfolder/subfolder\nstud50@192.168.5.250:~$ touch myfolder/file1.txt\nstud50@192.168.5.250:~$ touch myfolder/file2.txt\nstud50@192.168.5.250:~$ sort myfolder/file1.txt -o myfolder/file1_sorted.txt\nstud50@192.168.5.250:~$ sort -n myfolder/file2.txt -o myfolder/file2_sorted.txt\nstud50@192.168.5.250:~$ rmdir myfolder/subfolder\nstud50@192.168.5.250:~$ ls myfolder\nfile1.txt  file1_sorted.txt  file2.txt  file2_sorted.txt\nstud50@192.168.5.250:~$ "
            },
            "3": {
                title: "Thread Creation (Pthread)",
                aim: "To write a C program that creates a new thread using the pthread library, makes the thread print a message and perform some work, and then waits for the thread to finish before the main program exits.",
                algorithm: "Step 1: Start the program and include the required header files.\nStep 2: Write a thread function that:\nStep 3: Receives a message,\nStep 4: Prints the message,\nStep 5: Waits for 2 seconds,\nStep 6: Prints that it has finished.\nStep 7: In the main function:\nStep 8: Declare a variable to store the thread ID.\nStep 9: Store a message to be passed to the thread.\nStep 10: Create a new thread using pthread_create().\nStep 11: Check if the thread was created successfully.\nStep 12: Print the ID of the new thread.\nStep 13: Wait for the thread to finish using pthread_join().\nStep 14: After the thread completes, print that the main thread is exiting.\nStep 15: End the program.",
                code: "#include <stdio.h>\n#include <stdlib.h>\n#include <pthread.h>\n#include <unistd.h>\n\nvoid *thread_function(void *arg) {\n    char *message = (char *)arg;\n    printf(\"Thread says: %s\\n\", message);\n    sleep(2);\n    printf(\"Thread finishes execution.\\n\");\n    return NULL;\n}\n\nint main(void) {\n    pthread_t my_thread_id;\n    char *message = \"Hello, world! I am a new thread.\";\n    int return_status;\n    printf(\"Main thread: Creating a new thread...\\n\");\n    return_status = pthread_create(&my_thread_id, NULL, thread_function, (void *)message);\n    if (return_status != 0) {\n        printf(\"Main thread: Error creating thread. Exiting.\\n\");\n        abort();\n    }\n    printf(\"Main thread: New thread created with ID %lu.\\n\", (unsigned long)my_thread_id);\n    pthread_join(my_thread_id, NULL);\n    printf(\"Main thread: The new thread has finished. Main thread is exiting.\\n\");\n    return 0;\n}",
                output: "stud50@192.168.5.250:~$ nano thread.c\nstud50@192.168.5.250:~$ gcc thread.c -lpthread -o thread\nstud50@192.168.5.250:~$ ./thread\nMain thread: Creating a new thread...\nMain thread: New thread created with ID 140224536733440.\nThread says: Hello, world! I am a new thread.\nThread finishes execution.\nMain thread: The new thread has finished. Main thread is exiting.\nstud50@192.168.5.250:~$ "
            },
            "4": {
                title: "Deadlock Detection",
                aim: "To write and execute a C program to detect deadlocked processes in a system using available resources, allocation matrix, request matrix and to display the processes that are in a deadlock state.",
                algorithm: "Step 1: Start the program.\nStep 2: Define the number of processes P and resources R.\nStep 3: Initialize available[] array with the number of available instances for each resource.\nStep 4: Initialize allocation[][] matrix for the resources currently allocated to each process.\nStep 5: Initialize request[][] matrix for the additional resources requested by each process.\nStep 6: Initialize finish[] array to track whether a process has completed (set all values to 0).\nStep 7: Initialize work[] array as a copy of available[].\nStep 8: Repeat the following steps until no changes occur.\nStep 9: For each process p not yet finished:\nStep 10: Check if all requested resources of process p are less than or equal to available resources in work[].\nStep 11: If yes: Simulate process completion by adding allocated resources to work[]. Mark the process as finished.\nStep 12: Print all process numbers whose finish[] value is still 0.\nStep 13: If no such process exists, print \"None\" indicating no deadlock.\nStep 14: End the program.",
                code: "#include <stdio.h>\n#define P 4\n#define R 3\nint main() {\n    int allocation[P][R] = {{0,1,0},{2,0,0},{3,0,3},{2,1,1}};\n    int request[P][R] = {{0,0,0},{2,0,2},{0,0,0},{1,0,0}};\n    int available[R] = {1,5,2};\n    int finish[P] = {0}, work[R], i, j, k, changed;\n    for(i=0; i<R; i++) work[i] = available[i];\n    while(1) {\n        changed = 0;\n        for(i=0; i<P; i++) {\n            if(!finish[i]) {\n                int canRun = 1;\n                for(j=0; j<R; j++) if(request[i][j] > work[j]) canRun = 0;\n                if(canRun) {\n                    for(k=0; k<R; k++) work[k] += allocation[i][k];\n                    finish[i] = 1; changed = 1;\n                }\n            }\n        }\n        if(!changed) break;\n    }\n    printf(\"Deadlocked processes: \");\n    int found = 0;\n    for(i=0; i<P; i++) if(!finish[i]) { printf(\"P%d \", i); found = 1; }\n    if(!found) printf(\"None\");\n    printf(\"\\n\");\n    return 0;\n}",
                output: "stud50@192.168.5.250:~$ nano deadlock.c\nstud50@192.168.5.250:~$ gcc deadlock.c -o deadlock\nstud50@192.168.5.250:~$ ./deadlock\nDeadlocked processes: P1\nstud50@192.168.5.250:~$ "
            },
            "5": {
                title: "Memory Allocation (malloc)",
                aim: "Write a C program demonstrates dynamic memory allocation using malloc() and subsequent deallocation using free().",
                algorithm: "Step 1: Start the program.\nStep 2: Declare integer variables n and i for the count and loop iteration, and a pointer *ptr of type integer to hold the address of the dynamically allocated memory.\nStep 3: Prompt the user to input the number of elements (n).\nStep 4: Read the value of n from the user input.\nStep 5: Allocate memory using the expression malloc(n * sizeof(int)) and assign the returned address to ptr.\nStep 6: Check if the memory allocation was successful (if(ptr == NULL)). If not, display an error message and exit the program with an error code (1).\nStep 7: Prompt the user to enter the elements.\nStep 8: Loop from i = 0 to n - 1:\nStep 9: Read the next integer from the user and store it at the memory location pointed to by (ptr + i).\nStep 10: Display the message \"Entered elements are:\".\nStep 11: Loop from i = 0 to n - 1:\nStep 12: Print the integer value stored at the memory location *(ptr + i).\nStep 13: Deallocate the memory block referenced by ptr using the free(ptr) function.\nStep 14: Exit the program successfully (return 0).",
                code: "#include <stdio.h>\n#include <stdlib.h>\nint main() {\n    int n, i, *ptr;\n    printf(\"Enter number of elements: \");\n    scanf(\"%d\", &n);\n    ptr = (int*)malloc(n * sizeof(int));\n    if(ptr == NULL) {\n        printf(\"Error! memory not allocated.\\n\");\n        return 1;\n    }\n    printf(\"Enter elements: \");\n    for(i = 0; i < n; ++i) scanf(\"%d\", ptr + i);\n    printf(\"Entered elements are: \");\n    for(i = 0; i < n; ++i) printf(\"%d \", *(ptr + i));\n    printf(\"\\n\");\n    free(ptr);\n    return 0;\n}",
                output: "stud50@192.168.5.250:~$ nano memory.c\nstud50@192.168.5.250:~$ gcc memory.c -o memory\nstud50@192.168.5.250:~$ ./memory\nEnter number of elements: 3\nEnter elements: 10 20 30\n\nEntered elements are: 10 20 30\nMemory successfully deallocated. \nstud50@192.168.5.250:~$ "
            },
            "6": {
                title: "FIFO Page Replacement",
                aim: "The aim is to simulate the First-In-First-Out (FIFO) page replacement algorithm used in operating systems memory management.",
                algorithm: "Step 1: Start the program.\nStep 2: Declare arrays pages and frames, along with necessary integer variables (no_of_frames, no_of_pages, faults, next, flag, and loop counters).\nStep 3: Prompt the user to enter the no_of_frames, no_of_pages in the reference string.and pages reference string values one by one.\nStep 4: Iterate through each page in the pages reference string (from the first page to the last).\nStep 5: For the current requested page, iterate through the frames array to see if the page is already present.\nStep 6: If the page is found (a \"hit\"), set a flag to 1 and break the inner search loop.\nStep 7: If the flag remains 0 after checking all frames (a \"fault\"):\nStep 8: Place the incoming page into the frame indicated by the next pointer index.\nStep 9: Increment the faults counter.\nStep 10: Update the next pointer to point to the next frame in the circular queue using the modulo operator: next = (next + 1) % no_of_frames.\nStep 11: After handling the hit or fault, print the current configuration of the frames array for visualization.\nStep 12: Exit the program.",
                code: "#include <stdio.h>\nint main() {\n    int pages[50], frames[10], no_of_pages, no_of_frames, i, j, k, flag, faults = 0, next = 0;\n    printf(\"Enter number of frames: \");\n    scanf(\"%d\", &no_of_frames);\n    printf(\"Enter number of pages in reference string: \");\n    scanf(\"%d\", &no_of_pages);\n    printf(\"Enter reference string (space separated): \");\n    for(i=0; i<no_of_pages; ++i) scanf(\"%d\", &pages[i]);\n    for(i=0; i<no_of_frames; ++i) frames[i] = -1;\n    printf(\"\\nPage Reference String | Frames (FIFO)\\n\");\n    printf(\"-----------------------------------\\n\");\n    for(i=0; i<no_of_pages; ++i) {\n        printf(\"%d | \", pages[i]);\n        flag = 0;\n        for(j=0; j<no_of_frames; ++j) {\n            if(frames[j] == pages[i]) {\n                flag = 1; break;\n            }\n        }\n        if(flag == 0) {\n            frames[next] = pages[i];\n            next = (next + 1) % no_of_frames;\n            faults++;\n        }\n        for(k=0; k<no_of_frames; ++k) printf(\"%d \", frames[k]);\n        printf(\"\\n\");\n    }\n    printf(\"\\nTotal Page Faults: %d\\n\", faults);\n    return 0;\n}",

        function showCheatSheet(num) {
            const sheet = cheatSheets[num];
            if (!sheet) return;
            currentViewingProgram = num;
            const header = document.querySelector('.cheat-header');
            if (header) header.style.display = 'none';
            document.getElementById('cheat-body').innerHTML = `
                <div class="section-title">TITLE</div><div>${sheet.title}</div>
                <div class="section-title">AIM</div><div>${sheet.aim}</div>
                <div class="section-title">ALGORITHM</div><div>${sheet.algorithm.replace(/\n/g, '<br/>')}</div>
                <div class="section-title">CODE</div><div class="code-block">${sheet.code.replace(/\n/g, '<br/>')}</div>
                <div class="section-title">OUTPUT</div><div class="output-block">${sheet.output.replace(/\n/g, '<br/>')}</div>
            `;
            document.getElementById('overlay').classList.add('active');
        }

        function hideCheatSheet() {
            document.getElementById('overlay').classList.remove('active');
            currentViewingProgram = null;
        }

        function writeMockSession(num) {
            const sheet = cheatSheets[num];
            if (!sheet) return;
            hideCheatSheet();

            // Proactively create the code file if a nano command is present in the output
            const nanoMatch = sheet.output.match(/nano\s+([^\s\n]+)/);
            if (nanoMatch) {
                const fn = resolvePath(nanoMatch[1]);
                fileSystem = fileSystem.filter(f => f.name !== fn);
                fileSystem.push({ name: fn, type: 'file', content: sheet.code });
            }

            const lines = sheet.output.replace(/stud50/g, `stud${regNo}`).split('\n');
            term.write('\r\n');
            lines.forEach(line => {
                if (line.includes('@192.168.5.250:')) {
                    const parts = line.split('$ ');
                    const cmd = parts[1] || "";
                    handleCommand(cmd, true);
                    updatePrompt();
                    term.write('\x1b[1;32m' + currentPrompt.split('$ ')[0] + '\x1b[0m$ ' + cmd + '\r\n');
                } else {
                    term.write('\x1b[0;37m' + line + '\x1b[0m\r\n');
                }
            });
            term.write(currentPrompt);
        }

        function handleCommand(cmd, silent = false) {
            const parts = cmd.trim().split(/\s+/);
            const action = parts[0] ? parts[0].toLowerCase() : "";
            const args = parts.slice(1);
            if (!action) return;
            if (!silent) history.push(cmd);

            switch (action) {
                case 'ls':
                    let target = resolvePath(args[0] || ".");
                    const filtered = fileSystem.filter(item => {
                        if (target === "") return !item.name.includes('/');
                        return item.name.startsWith(target + '/') && !item.name.slice(target.length + 1).includes('/');
                    });
                    if (!silent) {
                        const output = filtered.map(item => {
                            const dName = item.name.split('/').pop();
                            return item.type === 'dir' ? `\x1b[1;34m${dName}\x1b[0m` : (item.type === 'exec' ? `\x1b[1;32m${dName}\x1b[0m` : dName);
                        }).join('  ');
                        term.write(output + (output ? '\r\n' : ''));
                    }
                    break;
                case 'cd':
                    if (!args[0] || args[0] === "~") currentDir = "";
                    else {
                        const newPath = resolvePath(args[0]);
                        if (newPath === "" || fileSystem.find(f => f.name === newPath && f.type === 'dir')) currentDir = newPath;
                        else if (!silent) term.write(`-bash: cd: ${args[0]}: No such directory\r\n`);
                    }
                    updatePrompt();
                    break;
                case 'pwd':
                    if (!silent) term.write('/home/stud' + regNo + (currentDir ? '/' + currentDir : '') + '\r\n');
                    break;
                case 'mkdir':
                    if (args[0]) {
                        const p = resolvePath(args[0]);
                        if (!fileSystem.find(f => f.name === p)) fileSystem.push({ name: p, type: 'dir' });
                    }
                    break;
                case 'touch':
                    if (args[0]) {
                        const p = resolvePath(args[0]);
                        if (!fileSystem.find(f => f.name === p)) fileSystem.push({ name: p, type: 'file', content: "" });
                    }
                    break;
                case 'rm':
                    if (args[0]) fileSystem = fileSystem.filter(f => f.name !== resolvePath(args[0]));
                    break;
                case 'rmdir':
                    if (args[0]) {
                        const p = resolvePath(args[0]);
                        if (fileSystem.find(f => f.name === p && f.type === 'dir')) fileSystem = fileSystem.filter(f => f.name !== p);
                    }
                    break;
                case 'cp':
                case 'mv':
                    if (args[0] && args[1]) {
                        const s = resolvePath(args[0]), d = resolvePath(args[1]);
                        const src = fileSystem.find(f => f.name === s);
                        if (src) {
                            fileSystem = fileSystem.filter(f => f.name !== d);
                            if (action === 'cp') fileSystem.push({ name: d, type: src.type, content: src.content });
                            else src.name = d;
                        }
                    }
                    break;
                case 'echo':
                    const redirIdx = args.indexOf('>');
                    if (redirIdx !== -1 && args[redirIdx + 1]) {
                        const fn = resolvePath(args[redirIdx + 1]);
                        const c = args.slice(0, redirIdx).join(' ').replace(/^["']/, '').replace(/["']$/, '');
                        fileSystem = fileSystem.filter(f => f.name !== fn);
                        fileSystem.push({ name: fn, type: 'file', content: c });
                    } else if (!silent) term.write(args.join(' ') + '\r\n');
                    break;
                case 'cat':
                    if (args[0]) {
                        const f = fileSystem.find(f => f.name === resolvePath(args[0]));
                        if (f && f.content !== undefined && !silent) {
                            f.content.split('\n').forEach((l, i, arr) => term.write(l + (i < arr.length - 1 ? '\r\n' : '')));
                            term.write('\r\n');
                        }
                    }
                    break;
                case 'whoami': if (!silent) term.write('stud' + regNo + '\r\n'); break;
                case 'history': if (!silent) history.forEach((l, i) => term.write(`  ${i + 1}  ${l}\r\n`)); break;
                case 'clear': if (!silent) term.clear(); break;
                case 'help': if (!silent) term.write('Implemented: ls, cd, pwd, mkdir, rmdir, touch, rm, cp, mv, cat, whoami, clear, history, help, gcc, nano, split, cmp, diff, grep\r\n'); break;
                case 'gcc':
                    if (args[0]) {
                        const s = resolvePath(args[0]);
                        const oIdx = args.indexOf('-o');
                        if (oIdx !== -1 && args[oIdx + 1]) {
                            const e = resolvePath(args[oIdx + 1]);
                            if (!fileSystem.find(f => f.name === e)) fileSystem.push({ name: e, type: 'exec' });
                        }
                    }
                    break;
                case 'nano':
                    if (args[0] && !silent) {
                        inNano = true; nanoFile = args[0];
                        const f = fileSystem.find(f => f.name === resolvePath(nanoFile));
                        const c = f ? f.content : "";
                        document.getElementById('nano-filename-display').innerText = nanoFile;
                        const ta = document.getElementById('nano-textarea');
                        ta.value = c;
                        document.getElementById('nano-overlay').style.display = 'flex';
                        setTimeout(() => ta.focus(), 10);
                    }
                    break;
                default: if (!silent) term.write(`-bash: ${action}: command not found\r\n`);
            }
        }

        const programs = {
            fifo: programFIFO, pal: programPAL, palindrome: programPAL,
            bin: programBIN, converter: programBIN, binary_converter: programBIN,
            emp: programEMP, employee_details: programEMP,
            memory: programMEMORY, deadlock: programDEADLOCK,
            thread: programTHREAD
        };

        function startProgram(name) {
            const p = programs[name]; if (!p) return false;
            if (p.prompts.length === 0) {
                term.write(p.run([]) + '\r\n');
                return true;
            }
            inProgram = true; programState = 0; programData = { _name: name }; programInputBuffer = "";
            term.write(p.prompts[0]); return true;
        }

        function handleProgramInput(line) {
            const p = programs[programData._name];
            programData[programState] = line; programState++;
            if (programState < p.prompts.length) term.write(p.prompts[programState]);
            else {
                term.write('\r\n' + p.run(Array.from({ length: p.prompts.length }, (_, i) => programData[i])));
                inProgram = false; term.write('\r\n' + currentPrompt);
            }
        }

        document.getElementById('nano-textarea').addEventListener('keydown', function (e) {
            if (e.ctrlKey && e.key.toLowerCase() === 'x') {
                e.preventDefault(); inNano = false;
                const path = resolvePath(nanoFile);
                const f = fileSystem.find(f => f.name === path);
                if (f) f.content = this.value;
                else fileSystem.push({ name: path, type: 'file', content: this.value });
                document.getElementById('nano-overlay').style.display = 'none';
                term.focus(); term.write('\r\n' + currentPrompt);
            }
        });

        term.onKey(({ key, domEvent }) => {
            const char = domEvent.key;
            if (inLogin) {
                if (char === 'Enter') {
                    regNo = loginBuffer.trim() || '50'; inLogin = false;
                    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => { });
                    term.write('\x1bc'); updatePrompt(); term.write(currentPrompt); loginBuffer = '';
                } else if (char === 'Backspace') {
                    if (loginBuffer.length > 0) { loginBuffer = loginBuffer.slice(0, -1); term.write('\b \b'); }
                } else if (char.length === 1 && !domEvent.ctrlKey && !domEvent.altKey) { loginBuffer += char; term.write(char); }
                return;
            }
            if (inProgram) {
                if (char === 'Enter') { term.write('\r\n'); const l = programInputBuffer; programInputBuffer = ""; handleProgramInput(l); }
                else if (char === 'Backspace') { if (programInputBuffer.length > 0) { programInputBuffer = programInputBuffer.slice(0, -1); term.write('\b \b'); } }
                else if (char.length === 1 && !domEvent.ctrlKey && !domEvent.altKey) { programInputBuffer += char; term.write(char); }
                return;
            }
            if (domEvent.altKey && char >= '0' && char <= '9') {
                domEvent.preventDefault(); const n = char === '0' ? '10' : char;
                if (currentViewingProgram === n) writeMockSession(n);
                else showCheatSheet(n);
                return;
            }
            if (char === 'Backspace' && document.getElementById('overlay').classList.contains('active')) { domEvent.preventDefault(); hideCheatSheet(); return; }
            if (document.getElementById('overlay').classList.contains('active')) return;

            if (char === 'Enter') {
                term.write('\r\n');
                const actionArr = inputBuffer.trim().split(/\s+/);
                const first = actionArr[0] ? actionArr[0].toLowerCase() : "";
                if (first.startsWith('./')) {
                    const name = first.slice(2);
                    const file = fileSystem.find(f => f.name === resolvePath(name) && f.type === 'exec');
                    if (file) startProgram(name);
                    else handleCommand(inputBuffer);
                } else {
                    handleCommand(inputBuffer);
                }
                inputBuffer = "";
                if (!inNano && !inProgram) term.write(currentPrompt);
            } else if (char === 'Backspace') {
                if (inputBuffer.length > 0) { inputBuffer = inputBuffer.slice(0, -1); term.write('\b \b'); }
            } else if (char.length === 1 && !domEvent.ctrlKey && !domEvent.altKey) { inputBuffer += char; term.write(char); }
        });

        document.getElementById('close-btn').addEventListener('click', () => {
            window.close();
            setTimeout(() => { alert("Closing simulation..."); window.location.href = "about:blank"; }, 100);
        });

        window.addEventListener('keydown', (e) => {
            if (e.altKey && e.key === 'Delete') {
                e.preventDefault();
                document.getElementById('stealth-overlay').classList.toggle('active');
            }
        }, true);

        initTerminal();
    </script>
